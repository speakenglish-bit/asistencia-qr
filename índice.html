<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Camara</title>
</head>
<body>
    <h3>Prueba Directa de Cámara</h3>
    <button onclick="encender()">TOCAR PARA ENCENDER CÁMARA</button>
    <br><br>
    <video id="video" width="300" height="300" autoplay playsinline style="background:black"></video>
    <p id="error" style="color:red"></p>

    <script>
        async function encender() {
            const video = document.getElementById('video');
            const errorDiv = document.getElementById('error');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                alert("✅ ¡Cámara funcionando! El problema era la librería anterior.");
            } catch (err) {
                errorDiv.innerHTML = "Error: " + err.name + " - " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
