<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Asistencia</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 20px; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
        #status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 10px; }
        .loading { background: #e2e8f0; color: #475569; }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="card">
    <h2>📲 Escáner de Asistencia</h2>
    <div id="reader"></div>
    <div id="status" class="loading">Esperando escaneo...</div>
</div>

<script>
    // 1. REEMPLAZA ESTA URL POR LA TUYA DE GOOGLE SCRIPTS
    const MI_SCRIPT_URL = // Función para recibir datos del escáner externo
function doGet(e) {
  const id = e.parameter.id; // Recibimos el ID por la URL
  
  if (!id) return ContentService.createTextOutput("No se recibió ID");

  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const hojaEstudiantes = ss.getSheetByName("Estudiantes");
  const hojaAsistencias = ss.getSheetByName("Asistencias");

  // 1. Buscar Estudiante
  const datosEst = hojaEstudiantes.getDataRange().getValues();
  let estudiante = null;
  for (let i = 1; i < datosEst.length; i++) {
    if (datosEst[i][0].toString().trim() == id.toString().trim()) {
      estudiante = {
        id: datosEst[i][0],
        nombre: datosEst[i][2],
        activo: datosEst[i][4]
      };
      break;
    }
  }

  if (!estudiante) return ContentService.createTextOutput("❌ Estudiante no encontrado");
  if (estudiante.activo.toString().toUpperCase() !== "ACTIVO") return ContentService.createTextOutput("🔴 Estudiante INACTIVO");

  // 2. Registrar Asistencia
  const fechaHoy = Utilities.formatDate(new Date(), Session.getScriptTimeZone(), "dd/MM/yyyy");
  const horaHoy = Utilities.formatDate(new Date(), Session.getScriptTimeZone(), "HH:mm:ss");
  
  hojaAsistencias.appendRow([fechaHoy, horaHoy, estudiante.id, "", estudiante.nombre]);

  return ContentService.createTextOutput("✅ Asistencia registrada: " + estudiante.nombre);
};

    let bloqueado = false;

    function onScanSuccess(decodedText) {
        if (bloqueado) return;
        bloqueado = true;

        const statusDiv = document.getElementById("status");
        statusDiv.innerHTML = "⏳ Procesando ID: " + decodedText + "...";
        statusDiv.className = "loading";

        // Llamada al script de Google
        fetch(`${MI_SCRIPT_URL}?id=${decodedText}`)
            .then(response => response.text())
            .then(mensaje => {
                statusDiv.innerHTML = mensaje;
                statusDiv.className = mensaje.includes("✅") ? "success" : "error";
                
                // Desbloquear después de 3 segundos
                setTimeout(() => {
                    bloqueado = false;
                    statusDiv.innerHTML = "Listo para siguiente escaneo";
                    statusDiv.className = "loading";
                }, 3000);
            })
            .catch(err => {
                statusDiv.innerHTML = "❌ Error de conexión";
                statusDiv.className = "error";
                bloqueado = false;
            });
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
    );
</script>
</body>
</html>
